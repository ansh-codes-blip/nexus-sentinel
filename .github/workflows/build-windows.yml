name: Build Nexus Sentinel for Windows

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Set up Node.js 20
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install Python Dependencies
      run: |
        python -m venv venv
        venv\Scripts\activate.bat
        pip install -r backend\requirements.txt
        pip install pyinstaller

    - name: Compile Backend (PyInstaller)
      run: |
        venv\Scripts\activate.bat
        cd backend
        pyinstaller --onefile --name nexus-backend --collect-all scapy --collect-all uvicorn --collect-all fastapi run.py

    - name: Install Frontend Dependencies
      run: |
        cd frontend
        npm install

    - name: Build Electron App
      run: |
        cd frontend
        npm run dist
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Upload Windows Installer
      uses: actions/upload-artifact@v4
      with:
        name: Nexus-Sentinel-Windows-Installer
        path: frontend/release/Nexus Sentinel Setup 1.0.0.exe